################
### MONITORS ###
################

monitor=,preferred,auto,1

exec-once = hyprpaper
exec-once = hypridle
exec-once = mako

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

###################
### MY PROGRAMS ###
###################

$terminal = /home/rraks/.config/hypr/hypr-kitty-cwd.sh
$fileManager = nautilus
$menu = rofi

#################
### AUTOSTART ###
#################

exec-once = waybar

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,12
env = HYPRCURSOR_SIZE,12

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2

    col.active_border = rgba(D4BE98FF)
    col.inactive_border = rgba(ebdbb211)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

##############################
### WINDOW RULES (FIXED) ###
##############################

# Float modal popups and file dialogs
windowrule {
  name = windowrule-1
  float = on
  center = on
  match:modal = true
}

windowrule {
  name = windowrule-2
  float = on
  center = on
  match:title = ^(Open File|Save File)$
}

# Utility apps
windowrule {
  name = windowrule-3
  float = on
  size = 800 600
  center = on
  match:class = ^(pavucontrol|nm-connection-editor)$
}

# Prevent LibreOffice documents opened from Firefox from taking over the workspace
windowrule {
  name = windowrule-4
  suppress_event = maximize
  match:class = ^(libreoffice-.*|soffice)$
}

windowrule {
  name = windowrule-5
  suppress_event = fullscreen
  match:class = ^(libreoffice-.*|soffice)$
}



###################
### MISC (MERGED) ###
###################

misc {
    focus_on_activate = false
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

###################
### LAYOUTS ###
###################

dwindle {
    pseudotile = true
    force_split = 2
    preserve_split = true
    smart_split = false
    split_width_multiplier = 1.6
    use_active_for_splits = true
}

master {
    new_status = master
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = ctrl:nocaps
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = Alt
$super = Super

# Core
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, q, killactive
bind = $mainMod, M, exit
bind = $mainMod, F, togglefloating
bind = $mainMod, D, exec, $menu -show drun -show-icons

# Layout control
bind = $mainMod, P, pseudo
bind = $mainMod, E, togglesplit
bind = $mainMod SHIFT, Z, fullscreen, 0

# Grouping
bind = $mainMod, s, togglegroup
bind = $mainMod SHIFT, l, changegroupactive, b
bind = $mainMod CONTROL, right, changegroupactive, f

# Focus movement
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Deterministic splits (IMPORTANT)
bind = $mainMod, v, layoutmsg, splitright
bind = $mainMod, b, layoutmsg, splitdown

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows to workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Workspace cycling
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Previous workspace
bind = $mainMod, Tab, workspace, previous

# Scratchpad
bind = $mainMod, minus, togglespecialworkspace, magic
bind = $mainMod SHIFT, minus, movetoworkspace, special:magic

# Mouse actions
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###################
### MEDIA KEYS ###
###################

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

###################
### SCREENSHOT ###
###################

bind = , Print, exec, sh -c 'REGION=$(slurp) || exit; grim -g "$REGION" - | wl-copy && wl-paste > ~/Pictures/screenshots/Screenshot-$(date +%F_%T).png'
bind = SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/screenshots/Screenshot-$(date +%F_%T).png'

###################
### SCREEN RECORD ###
###################

bind = $mainMod SHIFT, R, exec, zsh /home/rraks/.config/hypr/screenrecord.sh
bind = $mainMod SHIFT, C, exec, pkill wf-recorder
